name: Build

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DropInpector.sln

      - name: Build
        run: dotnet build DropInpector.sln -c Release --no-restore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained
        run: dotnet publish DropInpector/DropInpector.csproj -c Release -r win-x64 --self-contained true -o ./publish

      - name: Create archive
        run: Compress-Archive -Path ./publish/* -DestinationPath DropInpector-win-x64.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: DropInpector-win-x64.zip
